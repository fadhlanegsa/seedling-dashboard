<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mockup Form Operator Lapangan</title>
    <!-- Menggunakan Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            /* Memberikan ruang di bagian bawah agar konten tidak tertutup oleh sticky bottom bar */
            padding-bottom: 100px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* Tema Warna PPTH (Hijau Earth-tone) */
        :root {
            --ppth-green: #2e7d32;
            --ppth-green-light: #e8f5e9;
            --ppth-green-dark: #1b5e20;
        }
        
        .btn-primary {
            background-color: var(--ppth-green);
            border-color: var(--ppth-green);
        }
        .btn-primary:hover, .btn-primary:active, .btn-primary:focus {
            background-color: var(--ppth-green-dark) !important;
            border-color: var(--ppth-green-dark) !important;
        }
        .btn-outline-primary {
            border-color: var(--ppth-green);
            color: var(--ppth-green);
        }
        .btn-outline-primary:hover {
            background-color: var(--ppth-green-light);
            color: var(--ppth-green);
        }
        .text-primary {
            color: var(--ppth-green) !important;
        }

        /* 1. Styling untuk Tap-able Cards */
        .btn-check:checked + .btn-outline-primary {
            background-color: var(--ppth-green);
            color: white;
            border-color: var(--ppth-green);
            box-shadow: 0 4px 8px rgba(46, 125, 50, 0.3);
        }
        
        .radio-card {
            border-radius: 16px;
            transition: all 0.2s ease;
            border-width: 2px;
            background-color: white;
        }

        .radio-card:active {
            transform: scale(0.95);
        }
        
        /* 2. Styling untuk Input Angka (Sembunyikan panah default browser) */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* 3. Wrapper untuk Sticky Bottom Bar */
        .sticky-bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
            z-index: 1030;
            /* Safe area padding untuk perangkat seperti iPhone X dan terbaru */
            padding-bottom: calc(1rem + env(safe-area-inset-bottom));
        }

        /* Kustomisasi styling Accordion */
        .accordion-button:not(.collapsed) {
            background-color: var(--ppth-green-light);
            color: var(--ppth-green);
        }
    </style>
</head>
<body>

<div class="container-fluid p-3">
    <div class="d-flex align-items-center mb-4 mt-2">
        <h4 class="fw-bold mb-0 flex-grow-1 text-center">Input Data Lapangan</h4>
    </div>

    <form id="mobileForm">
        <!-- STANDAR 1: Tap-able Cards untuk Dropdown/Kategori -->
        <div class="mb-4">
            <label class="form-label fw-bold text-muted small px-1">KATEGORI PEKERJAAN</label>
            <div class="row g-3">
                <div class="col-6">
                    <input type="radio" class="btn-check" name="kategori" id="kat_tanam" autocomplete="off" checked>
                    <label class="btn btn-outline-primary radio-card w-100 p-3 h-100 d-flex flex-column align-items-center justify-content-center text-secondary" for="kat_tanam">
                        <span class="fs-1 mb-2">🌱</span>
                        <span class="fw-bold">Tanam</span>
                    </label>
                </div>
                <div class="col-6">
                    <input type="radio" class="btn-check" name="kategori" id="kat_pupuk" autocomplete="off">
                    <label class="btn btn-outline-primary radio-card w-100 p-3 h-100 d-flex flex-column align-items-center justify-content-center text-secondary" for="kat_pupuk">
                        <span class="fs-1 mb-2">💧</span>
                        <span class="fw-bold">Pemupukan</span>
                    </label>
                </div>
                <div class="col-6">
                    <input type="radio" class="btn-check" name="kategori" id="kat_panen" autocomplete="off">
                    <label class="btn btn-outline-primary radio-card w-100 p-3 h-100 d-flex flex-column align-items-center justify-content-center text-secondary" for="kat_panen">
                        <span class="fs-1 mb-2">🌾</span>
                        <span class="fw-bold">Panen</span>
                    </label>
                </div>
                <div class="col-6">
                    <input type="radio" class="btn-check" name="kategori" id="kat_hama" autocomplete="off">
                    <label class="btn btn-outline-primary radio-card w-100 p-3 h-100 d-flex flex-column align-items-center justify-content-center text-secondary" for="kat_hama">
                        <span class="fs-1 mb-2">🐛</span>
                        <span class="fw-bold">Hama & Penyakit</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- STANDAR 2: Optimasi Input Angka -->
        <div class="mb-4">
            <label class="form-label fw-bold text-muted small px-1">JUMLAH / KUANTITAS</label>
            <div class="input-group input-group-lg shadow-sm rounded-4 overflow-hidden">
                <button class="btn btn-light border border-end-0 px-4 fs-3 text-primary d-flex align-items-center justify-content-center" type="button" onclick="ubahQty(-1)" style="width: 80px;">-</button>
                <!-- Input number dengan pattern dan inputmode agar memunculkan numeric pad di HP -->
                <input type="number" inputmode="numeric" pattern="[0-9]*" class="form-control text-center fs-1 fw-bold border-light text-primary" id="qty_input" value="1" onfocus="this.select()" style="background: white; height: 80px;">
                <button class="btn btn-light border border-start-0 px-4 fs-3 text-primary d-flex align-items-center justify-content-center" type="button" onclick="ubahQty(1)" style="width: 80px;">+</button>
            </div>
        </div>

        <!-- STANDAR 4: Minimalist Form dengan Accordion untuk Input Opsional -->
        <div class="mb-4">
            <div class="accordion shadow-sm border-0 rounded-4 overflow-hidden" id="accordionOptional">
                <div class="accordion-item border-0">
                    <h2 class="accordion-header" id="headingNotes">
                        <button class="accordion-button collapsed fw-bold text-muted" type="button" data-bs-toggle="collapse" data-bs-target="#collapseNotes" aria-expanded="false" aria-controls="collapseNotes">
                            <span class="me-2">📝</span> Catatan Tambahan (Opsional)
                        </button>
                    </h2>
                    <div id="collapseNotes" class="accordion-collapse collapse" aria-labelledby="headingNotes" data-bs-parent="#accordionOptional">
                        <div class="accordion-body bg-light">
                            <textarea class="form-control border-0 shadow-sm" rows="4" placeholder="Tuliskan keterangan atau kondisi temuan di lapangan..."></textarea>
                        </div>
                    </div>
                </div>
                <!-- Contoh form tambahan opsional lainnya -->
                <div class="accordion-item border-0 border-top">
                    <h2 class="accordion-header" id="headingCamera">
                        <button class="accordion-button collapsed fw-bold text-muted" type="button" data-bs-toggle="collapse" data-bs-target="#collapseCamera" aria-expanded="false" aria-controls="collapseCamera">
                            <span class="me-2">📸</span> Lampirkan Foto (Opsional)
                        </button>
                    </h2>
                    <div id="collapseCamera" class="accordion-collapse collapse" aria-labelledby="headingCamera" data-bs-parent="#accordionOptional">
                        <div class="accordion-body bg-light">
                            <input class="form-control border-0 shadow-sm" type="file" accept="image/*" capture="environment">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<!-- STANDAR 3: Sticky Bottom Bar untuk Tombol Simpan -->
<div class="sticky-bottom-bar p-3">
    <button type="button" class="btn btn-primary btn-lg w-100 py-3 rounded-pill fw-bold shadow d-flex align-items-center justify-content-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-cloud-arrow-up-fill" viewBox="0 0 16 16">
            <path d="M8 2a5.53 5.53 0 0 0-3.594 1.342c-.766.66-1.321 1.52-1.464 2.383C1.266 6.095 0 7.555 0 9.318 0 11.366 1.708 13 3.781 13h8.906C14.502 13 16 11.57 16 9.773c0-1.636-1.242-2.969-2.834-3.194C12.923 3.999 10.69 2 8 2m2.354 5.146a.5.5 0 0 1-.708.708L8.5 6.707V10.5a.5.5 0 0 1-1 0V6.707L6.354 7.854a.5.5 0 1 1-.708-.708l2-2a.5.5 0 0 1 .708 0z"/>
        </svg>
        SIMPAN DATA
    </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // JS Logic untuk tombol - / +
    function ubahQty(delta) {
        const input = document.getElementById('qty_input');
        let val = parseInt(input.value) || 0;
        val += delta;
        // Mencegah nilai negatif
        if (val < 1) val = 1; 
        input.value = val;
    }
</script>
</body>
</html>
